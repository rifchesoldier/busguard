name: busguard
description: BusGuard - Suivi de bus scolaire en temps réel
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.5.6
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  flutter_local_notifications: ^17.1.2
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
