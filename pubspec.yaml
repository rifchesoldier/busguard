name: busguard
description: BusGuard - Suivi de bus scolaire en temps réel à Dakar
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.1.6
  google_sign_in: ^6.2.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  flutter_background_service: ^5.0.10
  flutter_local_notifications: ^18.0.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
